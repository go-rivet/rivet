name: E2E

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions: {}

jobs:
  e2e:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: End-to-End Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rivet repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build and Install rivet
        run: |
          git fetch --tags --force      
          make build
          make install
          RUNNER_GOBIN=$(go env GOBIN)
          if [ -z "$RUNNER_GOBIN" ]; then
            RUNNER_GOBIN=$(go env GOPATH)/bin
          fi
          echo "$RUNNER_GOBIN" >> $GITHUB_PATH

      - name: Verify Installation
        run: |
          which rivet
          rivet --version

      - name: Clone go-rivet/e2e repository
        uses: actions/checkout@v4
        with:
          repository: go-rivet/e2e
          path: e2e

      - name: Build E2E test runner
        run: |
          cd e2e
          make build

      - name: Run E2E tests
        run: |
          cd e2e
          bin/re2e catalog