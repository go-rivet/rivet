version: '3'

vars:
  BAZ:
    sh: echo baz
  FOO: foo
  BAR: bar
  QUX: from_taskfile

tasks:
  default:
    cmds:
      - task: local
      - task: global
      - task: not-overridden
      - task: multiple_type
      - task: dynamic

  local:
    vars:
      AMD64: amd64
      GOOS: linux
      GOARCH: "{{.AMD64}}"
      CGO_ENABLED:
        sh: echo '0'
    cmds:
      - echo "GOOS='$GOOS' GOARCH='$GOARCH' CGO_ENABLED='$CGO_ENABLED'"

  global:
    vars:
      BAR: overridden
    cmds:
      - echo "FOO='$FOO' BAR='$BAR' BAZ='$BAZ'"

  multiple_type:
    vars:
      FOO: 1
      BAR: true
      BAZ: 1.1
    cmds:
      - echo "FOO='$FOO' BAR='$BAR' BAZ='$BAZ'"

  not-overridden:
    cmds:
      - echo "QUX='$QUX'"

  overridden:
    cmds:
      - echo "QUX='$QUX'"

  dynamic:
    silent: true
    vars:
      DYNAMIC_FOO:
        sh: echo $FOO
    cmds:
      - echo "{{ .DYNAMIC_FOO }}"
