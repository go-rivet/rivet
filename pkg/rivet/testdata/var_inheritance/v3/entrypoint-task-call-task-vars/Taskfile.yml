version: '3'

silent: true
dotenv:
  - 'global.env'
vars:
  VAR: entrypoint-global-vars
  ENV: entrypoint-global-vars

tasks:
  default:
    dotenv:
      - 'task.env'
    cmds:
      - task: called-task
        vars:
          VAR: entrypoint-task-call-vars

  called-task:
    vars:
      VAR: entrypoint-task-call-task-vars
      ENV: entrypoint-task-call-task-vars
    cmds:
      - 'echo "{{.VAR}}"'
      - 'echo "$ENV"'
