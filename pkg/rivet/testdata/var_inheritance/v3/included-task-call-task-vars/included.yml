version: '3'

silent: true
vars:
  VAR: included-global-vars
  ENV: included-global-vars

tasks:
  default:
    dotenv:
      - 'task.env'
    cmds:
      - task: called-task
        vars:
          VAR: included-task-call-vars

  called-task:
    vars:
      VAR: included-task-call-task-vars
      ENV: included-task-call-task-vars
    cmds:
      - 'echo "{{.VAR}}"'
      - 'echo "$ENV"'
