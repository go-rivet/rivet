version: '3'
tasks:
  build-checksum:
    status:
      - echo "foo"
      - echo "{{.CHECKSUM}}"
    transforms:
      - matches:
          - ./source.txt
  build-ts:
    method: timestamp
    status:
      - echo '{{.TIMESTAMP.Unix}}'
      - echo '{{.TIMESTAMP}}'
    transforms:
      - matches:
          - ./source.txt
