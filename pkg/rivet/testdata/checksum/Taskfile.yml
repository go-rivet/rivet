version: '3'
tasks:
  build:
    cmds:
      - cp ./source.txt ./generated.txt
    method: checksum
    transforms:
      - matches:
          - ./**/glob-with-inexistent-file.txt
          - ./*.txt
          - exclude: ./ignore_me.txt
          - exclude: ./generated.txt
        yields:
          - ./generated.txt
  build-*:
    cmds:
      - cp ./source.txt ./generated-{{index .MATCH 0}}.txt
    transforms:
      - matches:
          - ./source.txt
        yields:
          - ./generated-{{index .MATCH 0}}.txt
  method: checksum
  build-with-status:
    cmds:
      - cp ./source.txt ./generated.txt
    status:
      - test -f ./generated.txt
    transforms:
      - matches:
          - ./source.txt
