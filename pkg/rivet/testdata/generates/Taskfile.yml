version: '3'
vars:
  BUILD_DIR:
    sh: pwd
tasks:
  abs.txt:
    desc: generates dest file based on absolute paths
    deps:
      - sub/src.txt
    dir: sub
    cmds:
      - cat src.txt > '{{.BUILD_DIR}}/abs.txt'
    method: timestamp
    transforms:
      - matches:
          - src.txt
        yields:
          - "{{.BUILD_DIR}}/abs.txt"
  rel.txt:
    desc: generates dest file based on relative paths
    deps:
      - sub/src.txt
    dir: sub
    cmds:
      - cat src.txt > '../rel.txt'
    method: timestamp
    transforms:
      - matches:
          - src.txt
        yields:
          - "../rel.txt"
  sub/src.txt:
    desc: generate source file
    cmds:
      - mkdir -p sub
      - echo "hello world" > sub/src.txt
    method: timestamp
    status:
      - test -f sub/src.txt
  'my text file.txt':
    desc: generate file with spaces in the name
    deps: [sub/src.txt]
    cmds:
      - cat sub/src.txt > 'my text file.txt'
    method: timestamp
    transforms:
      - matches:
          - sub/src.txt
        yields:
          - 'my text file.txt'
