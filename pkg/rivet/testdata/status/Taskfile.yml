version: '3'
tasks:
  gen-foo:
    cmds:
      - touch foo.txt
    status:
      - test 1 = 0
    transforms:
      - matches:
          - ./foo.txt
  gen-bar:
    cmds:
      - touch bar.txt
    status:
      - test 1 = 1
    transforms:
      - matches:
          - ./bar.txt
  gen-silent-baz:
    silent: true
    cmds:
      - touch baz.txt
    transforms:
      - matches:
          - ./baz.txt
