version: '3'
method: none
vars:
  GLOB_SINGLE: 'foo.*'
  GLOB_ARRAY: ['*.txt', '*.yml']
  GLOB_STRING: '*.txt:*.yml'
  GLOB_SPLIT: '{{splitList ":" .GLOB_STRING | toJson}}'
tasks:
  default:
    cmds:
      - cmd: touch foo.txt
      - cmd: touch bar.txt
      - cmd: touch foo.yml
      - cmd: touch bar.yml
      - task: direct
      - task: single
      - task: array
      - task: string
      - task: split
  direct:
    cmds:
      - echo "== {{.TASK}} =="
      - for: sources
        cmd: echo {{.ITEM}}
    transforms:
      - matches:
          - '*.txt'
  single:
    cmds:
      - echo "== {{.TASK}} =="
      - for: sources
        cmd: echo {{.ITEM}}
    transforms:
      - matches:
          - '{{.GLOB_SINGLE}}'
  array:
    cmds:
      - echo "== {{.TASK}} =="
      - for: sources
        cmd: echo {{.ITEM}}
    transforms:
      - matches:
          - '{{.GLOB_ARRAY}}'
          - exclude: Taskfile.yml
  string:
    cmds:
      - echo "== {{.TASK}} =="
      - for: sources
        cmd: echo {{.ITEM}}
    transforms:
      - matches:
          - '{{splitList ":" .GLOB_STRING | toJson}}'
          - exclude: Taskfile.yml
  split:
    cmds:
      - echo "== {{.TASK}} =="
      - for: sources
        cmd: echo {{.ITEM}}
    transforms:
      - matches:
          - '{{.GLOB_SPLIT}}'
          - exclude: Taskfile.yml
