version: '3'
tasks:
  server:
    cmds:
      - echo "server start"
      - defer: sleep 0.2; echo "server end"
      - sleep 10
    transforms:
      - matches:
          - 'foo.txt'
  client:
    cmds:
      - sleep 0.2
      - echo "client start"
      - defer: sleep 0.6; echo "client end"
      - sleep 10
  default:
    deps:
      - server
      - client
