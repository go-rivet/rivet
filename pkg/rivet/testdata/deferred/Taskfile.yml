version: '3'

tasks:
  task-1:
    - echo 'task-1 ran {{.PARAM}}'

  task-2:
    - defer: { task: 'task-1', vars: { PARAM: 'd1 successfully' } }
    - defer: { task: 'task-1', vars: { PARAM: 'd2 successfully' } }
    - defer: echo 'd3 echo ran'
    - defer: echo 'd4 failing' && exit 2
    - echo 'cmd ran'
    - exit 1

  parent:
    vars:
      VAR1: "value-from-parent"
    cmds:
      - defer:
          task: child
          vars:
            VAR1: 'task deferred {{.VAR1}}'
      - task: child
        vars:
          VAR1: 'task immediate {{.VAR1}}'
  child:
    cmds:
    - cmd: echo "child {{.VAR1}}"
